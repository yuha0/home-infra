apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/instance: ups
    app.kubernetes.io/name: nut-exporter
configMapGenerator:
- name: ups-manufacturer
  literals:
  - UPS_MANUFACTURER=CPS
- name: entrypoint-override
  files:
  - entrypoint-override.sh
resources:
- service.yaml
- daemonset.yaml
- sealed-nut-client.yaml
- servicemonitor.yaml
