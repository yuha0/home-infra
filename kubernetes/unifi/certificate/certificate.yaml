apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: unifios-tls-certificate
spec:
  dnsNames:
  - unifi.core.yuha0.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  secretName: unifios-tls-certificate
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: unvr-tls-certificate
spec:
  dnsNames:
  - unvr.core.yuha0.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  secretName: unvr-tls-certificate
