apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: pocket-id
spec:
  destinations:
  - namespace: "pocket-id"
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pocket-id
spec:
  project: pocket-id
  source:
    path: kubernetes/pocket-id
  destination:
    namespace: pocket-id
