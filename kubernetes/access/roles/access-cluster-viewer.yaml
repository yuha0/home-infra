apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: access-cluster-viewer
rules:
- apiGroups:
  - ""
  resources:
  - bindings
  - componentstatuses
  - configmaps
  - endpoints
  - events
  - limitranges
  - namespaces
  - nodes
  - persistentvolumeclaims
  - persistentvolumes
  - pods
  - podtemplates
  - replicationcontrollers
  - resourcequotas
  - serviceaccounts
  - services
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - apps
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - batch
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - autoscaling
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - networking.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - policy
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - storage.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - coordination.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - discovery.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - events.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - node.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - scheduling.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - flowcontrol.apiserver.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
# CRDs
- apiGroups:
  - acme.cert-manager.io
  - argoproj.io
  - awx.ansible.com
  - bitnami.com
  - cert-manager.io
  - cilium.io
  - monitoring.coreos.com
  - postgresql.cnpg.io
  - snapshot.storage.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - watch
  - list
