- name: Check vector version
  ansible.builtin.shell: "/usr/bin/vector --version | cut -d' ' -f2"
  ignore_errors: yes
  register: vector_version_current
  changed_when: vector_version_current is undefined or vector_version_current.stdout != vector_version

- name: ensure vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  with_items:
  - /var/log/vector
  - "{{ vector_data_dir }}"
  - /var/log/vector/archive
  - /etc/vector

- name: Download vector
  get_url:
    url: "https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/vector-{{ vector_version }}-{{ ansible_architecture }}-unknown-linux-gnu.tar.gz"
    dest: "/var/log/vector/archive/vector-{{ vector_version }}-{{ ansible_architecture }}-unknown-linux-gnu.tar.gz"
    checksum: "sha256:https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/vector-{{ vector_version }}-SHA256SUMS"
    mode: '0640'
  when: vector_version_current is undefined or vector_version_current.stdout != vector_version
  register: vector_downloads

- name: Extract vector archive
  ansible.builtin.unarchive:
    src: "/var/log/vector/archive/vector-{{ vector_version }}-{{ ansible_architecture }}-unknown-linux-gnu.tar.gz"
    dest: /var/log/vector/archive
    remote_src: yes
  when: vector_version_current is undefined or vector_version_current.stdout != vector_version

- name: Copy vector executable to /usr/bin/vector
  ansible.builtin.copy:
    src: "/var/log/vector/archive/vector-{{ ansible_architecture }}-unknown-linux-gnu/bin/vector"
    dest: /usr/bin/vector
    remote_src: yes
    mode: "0755"
  when: vector_version_current is undefined or vector_version_current.stdout != vector_version

- name: Delete downloads
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
  - "/var/log/vector/archive/vector-{{ vector_version }}-{{ ansible_architecture }}-unknown-linux-gnu.tar.gz"
  - "/var/log/vector/archive/vector-{{ ansible_architecture }}-unknown-linux-gnu"

- name: Add vector config file
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: /etc/vector/vector.yaml
    owner: root
    group: root
    mode: '0644'
  register: vector_config

- name: Add vector systemd unit file
  ansible.builtin.copy:
    src: vector.service
    dest: /etc/systemd/system/vector.service
    owner: root
    group: root
    mode: '0644'
  register: vector_systemd

- name: Enable and start vector systemd unit
  ansible.builtin.systemd_service:
    name: vector
    state: started
    enabled: true

- name: Reload vector if systemd service is changed
  ansible.builtin.systemd_service:
    name: vector
    state: reloaded
  when: vector_systemd.changed

- name: Restart vector if vector binary or config is changed
  ansible.builtin.systemd_service:
    name: vector
    state: restarted
  when: vector_config.changed or vector_downloads.changed

# Enforce the UniFi Network JVM max heap. UniFi OS ships -Xmx{{ unifi_stock_xmx_mb }}M
# in /etc/default/unifi (read into UNIFI_NATIVE_OPTS by the unifi systemd unit),
# which is too small for Network 10.4.57 on the UDM-SE and causes a continuous
# Full-GC spiral. The file lives on the writable overlay, so OS image updates
# can revert it -- this re-enforces it on every run.
#
# We override ONLY the exact stock -Xmx{{ unifi_stock_xmx_mb }}M line. If neither
# the stock value nor our enforced value is present, UniFi OS has changed the
# default heap (possibly a real fix), in which case we abort rather than
# blindly clobber it. So upstream is free to take over.
- name: Read /etc/default/unifi
  ansible.builtin.slurp:
    src: /etc/default/unifi
  register: unifi_default_raw

- name: Detect current UniFi Network heap setting
  ansible.builtin.set_fact:
    unifi_stock_heap_present: "{{ ('-Xmx' ~ unifi_stock_xmx_mb ~ 'M') in (unifi_default_raw.content | b64decode) }}"
    unifi_enforced_heap_present: "{{ ('-Xmx' ~ unifi_heap_xmx_mb ~ 'M') in (unifi_default_raw.content | b64decode) }}"

- name: Abort if UniFi OS changed the default heap (neither stock nor enforced value present)
  ansible.builtin.assert:
    that:
      - unifi_stock_heap_present or unifi_enforced_heap_present
    fail_msg: >-
      Neither the stock -Xmx{{ unifi_stock_xmx_mb }}M nor the enforced
      -Xmx{{ unifi_heap_xmx_mb }}M was found in /etc/default/unifi. UniFi OS likely
      changed the default JVM heap -- refusing to override so upstream can take
      over. Review the file and update unifi_stock_xmx_mb before re-running.
    success_msg: "Recognized UniFi Network heap setting present; safe to enforce."

- name: Enforce UniFi Network JVM max heap (only when exact stock -Xmx{{ unifi_stock_xmx_mb }}M present)
  ansible.builtin.replace:
    path: /etc/default/unifi
    regexp: '-Xmx{{ unifi_stock_xmx_mb }}M'
    replace: '-Xmx{{ unifi_heap_xmx_mb }}M'
  when: unifi_stock_heap_present
  register: unifi_heap

- name: Restart UniFi Network application if heap was changed
  ansible.builtin.systemd_service:
    name: unifi
    state: restarted
  when: unifi_heap.changed | default(false)
